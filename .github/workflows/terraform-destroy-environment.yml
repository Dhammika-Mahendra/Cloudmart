name: Terraform Destroy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      confirmation:
        description: "Type destroy-staging or destroy-prod to confirm"
        required: true
      preserve_ecr:
        description: "Keep shared ECR repositories and images"
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'cloudmart-13-tfstate-804431973197' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'cloudmart-13-terraform-locks' }}
  CLOUDMART_TEAM_ID: ${{ vars.CLOUDMART_TEAM_ID || '13' }}
  CLOUDMART_OWNER_EMAIL: ${{ vars.CLOUDMART_OWNER_EMAIL || 'yasiram447@gmail.com' }}

jobs:
  destroy:
    name: Destroy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/envs/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check confirmation
        run: |
          EXPECTED="destroy-${{ inputs.environment }}"
          if [ "${{ inputs.confirmation }}" != "${EXPECTED}" ]; then
            echo "::error::Confirmation must be exactly '${EXPECTED}'."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform init
        run: >
          terraform init
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}"
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate"
          -backend-config="region=${{ env.AWS_REGION }}"
          -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"
          -backend-config="encrypt=true"

      - name: Delete Kubernetes ingress first
        run: |
          set +e
          EKS_CLUSTER_NAME="$(terraform output -json 2>/dev/null | jq -r '.eks_cluster_name.value // empty')"
          if [ -z "${EKS_CLUSTER_NAME}" ]; then
            echo "No EKS cluster output found; skipping Kubernetes cleanup."
            exit 0
          fi

          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"
          if [ "$?" -ne 0 ]; then
            echo "Could not configure kubectl for ${EKS_CLUSTER_NAME}; cluster may already be destroyed."
            exit 0
          fi

          kubectl delete ingress cloudmart-frontend \
            --namespace "cloudmart-${{ inputs.environment }}" \
            --ignore-not-found=true
          kubectl scale deployment \
            frontend product-service order-service user-service notification-service \
            --namespace "cloudmart-${{ inputs.environment }}" \
            --replicas=0 || true

      - name: Preserve shared ECR repositories
        if: inputs.preserve_ecr
        run: |
          set +e
          terraform state rm 'module.ecr.aws_ecr_repository.this["frontend"]'
          terraform state rm 'module.ecr.aws_ecr_repository.this["product-service"]'
          terraform state rm 'module.ecr.aws_ecr_repository.this["user-service"]'
          terraform state rm 'module.ecr.aws_ecr_repository.this["order-service"]'
          terraform state rm 'module.ecr.aws_ecr_repository.this["notification-service"]'
          terraform state rm 'module.ecr.aws_ecr_lifecycle_policy.this["frontend"]'
          terraform state rm 'module.ecr.aws_ecr_lifecycle_policy.this["product-service"]'
          terraform state rm 'module.ecr.aws_ecr_lifecycle_policy.this["user-service"]'
          terraform state rm 'module.ecr.aws_ecr_lifecycle_policy.this["order-service"]'
          terraform state rm 'module.ecr.aws_ecr_lifecycle_policy.this["notification-service"]'

      - name: Terraform destroy plan
        run: >
          terraform plan -destroy
          -var="aws_region=${{ env.AWS_REGION }}"
          -var="environment=${{ inputs.environment }}"
          -var="team_id=${{ env.CLOUDMART_TEAM_ID }}"
          -var="owner_email=${{ env.CLOUDMART_OWNER_EMAIL }}"
          -var="ses_from_email=${{ env.CLOUDMART_OWNER_EMAIL }}"
          -var="alert_email=${{ env.CLOUDMART_OWNER_EMAIL }}"
          -var="rds_deletion_protection=false"
          -var="rds_skip_final_snapshot=true"
          -out=destroy.tfplan

      - name: Terraform destroy apply
        run: terraform apply -auto-approve destroy.tfplan

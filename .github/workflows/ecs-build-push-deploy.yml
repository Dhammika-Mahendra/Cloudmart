name: ECS Build Push Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      deploy_to_ecs:
        description: "Register a new ECS task definition and update the ECS service"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - dev-ramosh99
      - main
    paths:
      - "services/**"
      - "ecs/**"
      - ".github/workflows/ecs-build-push-deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login-ecr.outputs.registry }}
      image-tag: ${{ env.IMAGE_TAG }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product-service
            context: services/product-service
            repository: cloudmart/product-service
            build_args: ""
          - service: order-service
            context: services/order-service
            repository: cloudmart/order-service
            build_args: ""
          - service: user-service
            context: services/user-service
            repository: cloudmart/user-service
            build_args: ""
          - service: notification-service
            context: services/notification-service
            repository: cloudmart/notification-service
            build_args: ""
          - service: frontend
            context: services/frontend
            repository: cloudmart/frontend
            build_args: "--build-arg NGINX_CONF=nginx.ecs.conf"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.repository }}" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${{ matrix.repository }}" \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Build image
        run: |
          docker build \
            ${{ matrix.build_args }} \
            -t "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:${IMAGE_TAG}" \
            -t "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:latest" \
            "${{ matrix.context }}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push image
        run: |
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:${IMAGE_TAG}"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:latest"

  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref_name == 'dev-ramosh99' || (github.event_name == 'workflow_dispatch' && inputs.deploy_to_ecs)
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render ECS task definition
        run: |
          DEPLOY_ENV="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}"
          TEAM_ID="${{ vars.CLOUDMART_TEAM_ID || '13' }}"
          DYNAMODB_TABLE="cloudmart-${DEPLOY_ENV}-${TEAM_ID}-products"
          RDS_SECRET_NAME="cloudmart-${DEPLOY_ENV}-${TEAM_ID}/rds/master-password"
          sed \
            -e "s|__AWS_REGION__|${AWS_REGION}|g" \
            -e "s|__ENVIRONMENT__|${DEPLOY_ENV}|g" \
            -e "s|__ECR_REGISTRY__|${{ needs.build-push.outputs.registry }}|g" \
            -e "s|__IMAGE_TAG__|${{ needs.build-push.outputs.image-tag }}|g" \
            -e "s|__ECS_TASK_EXECUTION_ROLE_ARN__|${{ secrets.ECS_TASK_EXECUTION_ROLE_ARN }}|g" \
            -e "s|__ECS_TASK_ROLE_ARN__|${{ secrets.ECS_TASK_ROLE_ARN }}|g" \
            -e "s|__DYNAMODB_TABLE__|${DYNAMODB_TABLE}|g" \
            -e "s|__RDS_SECRET_NAME__|${RDS_SECRET_NAME}|g" \
            -e "s|__JWT_SECRET__|${{ secrets.JWT_SECRET }}|g" \
            ecs/task-definition.json > task-definition.rendered.json

      - name: Ensure CloudWatch log group exists
        run: |
          LOG_GROUP="/ecs/cloudmart-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}"
          aws logs describe-log-groups --log-group-name-prefix "${LOG_GROUP}" \
            --query "logGroups[?logGroupName=='${LOG_GROUP}'].logGroupName" \
            --output text | grep -q "${LOG_GROUP}" || \
          aws logs create-log-group --log-group-name "${LOG_GROUP}"

      - name: Register ECS task definition
        id: register-task
        run: |
          TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          echo "task_definition_arn=${TASK_DEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --service "${{ secrets.ECS_SERVICE_NAME }}" \
            --task-definition "${{ steps.register-task.outputs.task_definition_arn }}" \
            --desired-count 1 \
            --force-new-deployment

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.ECS_SERVICE_NAME }}"

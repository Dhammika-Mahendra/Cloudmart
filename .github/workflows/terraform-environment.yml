name: Terraform Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
      state_bucket:
        description: "S3 bucket created by bootstrap"
        required: true
      lock_table:
        description: "DynamoDB lock table created by bootstrap"
        required: true
      team_id:
        description: "CloudMart team/group ID"
        required: true
        default: "group-id"
      owner_email:
        description: "Owner email for AWS cost tags"
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: ${{ inputs.aws_region }}

jobs:
  terraform:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/envs/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: >
          terraform init
          -backend-config="bucket=${{ inputs.state_bucket }}"
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate"
          -backend-config="region=${{ inputs.aws_region }}"
          -backend-config="dynamodb_table=${{ inputs.lock_table }}"
          -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: >
          terraform plan
          -var="aws_region=${{ inputs.aws_region }}"
          -var="environment=${{ inputs.environment }}"
          -var="team_id=${{ inputs.team_id }}"
          -var="owner_email=${{ inputs.owner_email }}"
          -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

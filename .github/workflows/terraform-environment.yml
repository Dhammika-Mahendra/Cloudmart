name: Terraform Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      aws_region:
        description: "AWS region"
        required: false
        default: "ap-south-1"
      state_bucket:
        description: "S3 bucket created by bootstrap"
        required: false
        default: "cloudmart-13-tfstate-804431973197"
      lock_table:
        description: "DynamoDB lock table created by bootstrap"
        required: false
        default: "cloudmart-13-terraform-locks"
      team_id:
        description: "CloudMart team/group ID"
        required: false
        default: "13"
      owner_email:
        description: "Owner email for AWS cost tags"
        required: false
        default: "yasiram447@gmail.com"

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-south-1' }}
  TF_STATE_BUCKET: ${{ inputs.state_bucket || vars.TF_STATE_BUCKET || 'cloudmart-13-tfstate-804431973197' }}
  TF_LOCK_TABLE: ${{ inputs.lock_table || vars.TF_LOCK_TABLE || 'cloudmart-13-terraform-locks' }}
  CLOUDMART_TEAM_ID: ${{ inputs.team_id || vars.CLOUDMART_TEAM_ID || '13' }}
  CLOUDMART_OWNER_EMAIL: ${{ inputs.owner_email || vars.CLOUDMART_OWNER_EMAIL || 'yasiram447@gmail.com' }}

jobs:
  terraform:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/envs/${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: >
          terraform init
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}"
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate"
          -backend-config="region=${{ env.AWS_REGION }}"
          -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"
          -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: >
          terraform plan
          -var="aws_region=${{ env.AWS_REGION }}"
          -var="environment=${{ inputs.environment }}"
          -var="team_id=${{ env.CLOUDMART_TEAM_ID }}"
          -var="owner_email=${{ env.CLOUDMART_OWNER_EMAIL }}"
          -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

name: Terraform Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      aws_region:
        description: "AWS region"
        required: false
        default: "ap-south-1"
      state_bucket:
        description: "S3 bucket created by bootstrap"
        required: false
        default: "cloudmart-13-tfstate-804431973197"
      lock_table:
        description: "DynamoDB lock table created by bootstrap"
        required: false
        default: "cloudmart-13-terraform-locks"
      team_id:
        description: "CloudMart team/group ID"
        required: false
        default: "13"
      owner_email:
        description: "Owner email for AWS cost tags"
        required: false
        default: "yasiram447@gmail.com"

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-south-1' }}
  TF_STATE_BUCKET: ${{ inputs.state_bucket || vars.TF_STATE_BUCKET || 'cloudmart-13-tfstate-804431973197' }}
  TF_LOCK_TABLE: ${{ inputs.lock_table || vars.TF_LOCK_TABLE || 'cloudmart-13-terraform-locks' }}
  CLOUDMART_TEAM_ID: ${{ inputs.team_id || vars.CLOUDMART_TEAM_ID || '13' }}
  CLOUDMART_OWNER_EMAIL: ${{ inputs.owner_email || vars.CLOUDMART_OWNER_EMAIL || 'yasiram447@gmail.com' }}
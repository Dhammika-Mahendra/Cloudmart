name: EKS Admin Access

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
      aws_region:
        description: "AWS region"
        required: false
        default: "ap-south-1"
      iam_user_arn:
        description: "IAM user ARN to grant kubectl access"
        required: true
        default: "arn:aws:iam::804431973197:user/cloud-user"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ inputs.aws_region }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'cloudmart-13-tfstate-804431973197' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'cloudmart-13-terraform-locks' }}

jobs:
  grant-access:
    name: Grant kubectl access
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/envs/${{ inputs.environment }}
        run: >
          terraform init
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}"
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate"
          -backend-config="region=${{ env.AWS_REGION }}"
          -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"
          -backend-config="encrypt=true"

      - name: Read cluster name
        id: tfout
        working-directory: infra/envs/${{ inputs.environment }}
        run: |
          CLUSTER_NAME="$(terraform output -raw eks_cluster_name)"
          echo "cluster_name=${CLUSTER_NAME}" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${{ steps.tfout.outputs.cluster_name }}"

      - name: Show current aws-auth
        run: kubectl get configmap aws-auth -n kube-system -o yaml

      - name: Grant kubectl access to IAM user
        env:
          IAM_USER_ARN: ${{ inputs.iam_user_arn }}
        run: |
          kubectl get configmap aws-auth -n kube-system -o json > /tmp/aws-auth.json

          python <<'PY'
          import json
          import os
          import pathlib

          path = pathlib.Path("/tmp/aws-auth.json")
          configmap = json.loads(path.read_text())
          data = configmap.setdefault("data", {})

          iam_user_arn = os.environ["IAM_USER_ARN"]
          username = iam_user_arn.rsplit("/", 1)[-1]
          existing = data.get("mapUsers", "").strip()
          entry = (
              f"- userarn: {iam_user_arn}\n"
              f"  username: {username}\n"
              "  groups:\n"
              "    - system:masters\n"
          )

          if iam_user_arn in existing:
              map_users = data.get("mapUsers", "")
          elif existing:
              map_users = existing + "\n" + entry
          else:
              map_users = entry

          data["mapUsers"] = map_users

          pathlib.Path("/tmp/aws-auth-patch.json").write_text(json.dumps({"data": {"mapUsers": data["mapUsers"]}}))
          PY

          kubectl patch configmap aws-auth \
            -n kube-system \
            --type merge \
            --patch-file /tmp/aws-auth-patch.json

      - name: Verify aws-auth
        run: kubectl get configmap aws-auth -n kube-system -o yaml

      - name: Verify cluster access
        run: |
          kubectl get nodes
          kubectl get pods -n cloudmart-${{ inputs.environment }}

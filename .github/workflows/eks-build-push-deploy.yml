name: EKS Build Push Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod
      deploy_to_eks:
        description: "Apply Kubernetes manifests to EKS"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - dev-ramosh99
      - main
    paths:
      - "services/**"
      - "k8s/**"
      - "infra/envs/**"
      - "infra/modules/eks/**"
      - ".github/workflows/eks-build-push-deploy.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  IMAGE_TAG: ${{ github.sha }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'cloudmart-13-tfstate-804431973197' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'cloudmart-13-terraform-locks' }}
  CLOUDMART_TEAM_ID: ${{ vars.CLOUDMART_TEAM_ID || '13' }}
  CLOUDMART_OWNER_EMAIL: ${{ vars.CLOUDMART_OWNER_EMAIL || 'yasiram447@gmail.com' }}

jobs:
  build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product-service
            context: services/product-service
            repository: cloudmart/product-service
            build_args: ""
          - service: order-service
            context: services/order-service
            repository: cloudmart/order-service
            build_args: ""
          - service: user-service
            context: services/user-service
            repository: cloudmart/user-service
            build_args: ""
          - service: notification-service
            context: services/notification-service
            repository: cloudmart/notification-service
            build_args: ""
          - service: frontend
            context: services/frontend
            repository: cloudmart/frontend
            build_args: "--build-arg NGINX_CONF=nginx.conf"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ matrix.repository }}" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${{ matrix.repository }}" \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE

      - name: Build image
        run: |
          docker build \
            ${{ matrix.build_args }} \
            -t "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:${IMAGE_TAG}" \
            -t "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:latest" \
            "${{ matrix.context }}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Push image
        run: |
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:${IMAGE_TAG}"
          docker push "${{ steps.login-ecr.outputs.registry }}/${{ matrix.repository }}:latest"

  deploy-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' || inputs.deploy_to_eks
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref_name == 'main' && 'prod' || 'staging') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            DEPLOY_ENV="prod"
          else
            DEPLOY_ENV="staging"
          fi
          echo "deploy_env=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/envs/${{ steps.env.outputs.deploy_env }}
        run: >
          terraform init
          -backend-config="bucket=${{ env.TF_STATE_BUCKET }}"
          -backend-config="key=${{ steps.env.outputs.deploy_env }}/terraform.tfstate"
          -backend-config="region=${{ env.AWS_REGION }}"
          -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}"
          -backend-config="encrypt=true"

      - name: Read Terraform outputs
        id: tfout
        working-directory: infra/envs/${{ steps.env.outputs.deploy_env }}
        run: |
          terraform output -json > tfoutputs.json
          echo "Available Terraform outputs:"
          jq -r 'keys[]' tfoutputs.json

          EKS_CLUSTER_NAME="$(jq -er '.eks_cluster_name.value // empty' tfoutputs.json)"
          DYNAMODB_TABLE_NAME="$(jq -er '.dynamodb_table_name.value // .dynamodb_products_table_name.value // empty' tfoutputs.json)"
          RDS_SECRET_NAME="$(jq -er '.rds_secret_name.value // empty' tfoutputs.json)"
          PRODUCT_SERVICE_ROLE_ARN="$(jq -r '.eks_service_account_role_arns.value["product-service"] // ""' tfoutputs.json)"
          USER_SERVICE_ROLE_ARN="$(jq -r '.eks_service_account_role_arns.value["user-service"] // ""' tfoutputs.json)"

          if [ -z "${EKS_CLUSTER_NAME}" ] || [ "${EKS_CLUSTER_NAME}" = "null" ]; then
            echo "::error::Terraform output eks_cluster_name is missing. Run the Terraform Environment workflow with action=apply for ${{ steps.env.outputs.deploy_env }} before deploying to EKS."
            exit 1
          fi

          echo "eks_cluster_name=${EKS_CLUSTER_NAME}" >> "$GITHUB_OUTPUT"
          echo "dynamodb_table_name=${DYNAMODB_TABLE_NAME}" >> "$GITHUB_OUTPUT"
          echo "rds_secret_name=${RDS_SECRET_NAME}" >> "$GITHUB_OUTPUT"
          echo "product_service_role_arn=${PRODUCT_SERVICE_ROLE_ARN}" >> "$GITHUB_OUTPUT"
          echo "user_service_role_arn=${USER_SERVICE_ROLE_ARN}" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${{ steps.tfout.outputs.eks_cluster_name }}"

      - name: Render Kubernetes manifests
        env:
          DEPLOY_ENV: ${{ steps.env.outputs.deploy_env }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PRODUCT_SERVICE_ROLE_ARN: ${{ steps.tfout.outputs.product_service_role_arn }}
          USER_SERVICE_ROLE_ARN: ${{ steps.tfout.outputs.user_service_role_arn }}
          ORDER_SERVICE_ROLE_ARN: ${{ secrets.ORDER_SERVICE_IRSA_ROLE_ARN }}
          NOTIFICATION_SERVICE_ROLE_ARN: ${{ secrets.NOTIFICATION_SERVICE_IRSA_ROLE_ARN }}
          DYNAMODB_TABLE: ${{ steps.tfout.outputs.dynamodb_table_name }}
          RDS_SECRET_NAME: ${{ steps.tfout.outputs.rds_secret_name }}
          SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL || 'noreply@cloudmart.example' }}
        run: |
          cp -R k8s/base k8s/rendered

          if [ "${DEPLOY_ENV}" = "staging" ]; then
            find k8s/rendered -type f -name "*.yaml" -exec sed -i "s/namespace: cloudmart-prod/namespace: cloudmart-staging/g" {} +
          fi

          PRODUCT_SERVICE_ROLE_ARN="${PRODUCT_SERVICE_ROLE_ARN:-REPLACE_WITH_PRODUCT_SERVICE_IRSA_ROLE_ARN}"
          USER_SERVICE_ROLE_ARN="${USER_SERVICE_ROLE_ARN:-REPLACE_WITH_USER_SERVICE_IRSA_ROLE_ARN}"
          ORDER_SERVICE_ROLE_ARN="${ORDER_SERVICE_ROLE_ARN:-REPLACE_WITH_ORDER_SERVICE_IRSA_ROLE_ARN}"
          NOTIFICATION_SERVICE_ROLE_ARN="${NOTIFICATION_SERVICE_ROLE_ARN:-REPLACE_WITH_NOTIFICATION_SERVICE_IRSA_ROLE_ARN}"
          SQS_QUEUE_URL="${SQS_QUEUE_URL:-REPLACE_WITH_SQS_QUEUE_URL}"
          JWT_SECRET="${JWT_SECRET:-REPLACE_WITH_STRONG_JWT_SECRET}"

          find k8s/rendered -type f -name "*.yaml" -exec sed -i \
            -e "s|111122223333.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/product-service:replace-me|${REGISTRY}/cloudmart/product-service:${IMAGE_TAG}|g" \
            -e "s|111122223333.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/order-service:replace-me|${REGISTRY}/cloudmart/order-service:${IMAGE_TAG}|g" \
            -e "s|111122223333.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/user-service:replace-me|${REGISTRY}/cloudmart/user-service:${IMAGE_TAG}|g" \
            -e "s|111122223333.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/notification-service:replace-me|${REGISTRY}/cloudmart/notification-service:${IMAGE_TAG}|g" \
            -e "s|111122223333.dkr.ecr.ap-south-1.amazonaws.com/cloudmart/frontend:replace-me|${REGISTRY}/cloudmart/frontend:${IMAGE_TAG}|g" \
            -e "s|REPLACE_WITH_PRODUCT_SERVICE_IRSA_ROLE_ARN|${PRODUCT_SERVICE_ROLE_ARN}|g" \
            -e "s|REPLACE_WITH_ORDER_SERVICE_IRSA_ROLE_ARN|${ORDER_SERVICE_ROLE_ARN}|g" \
            -e "s|REPLACE_WITH_USER_SERVICE_IRSA_ROLE_ARN|${USER_SERVICE_ROLE_ARN}|g" \
            -e "s|REPLACE_WITH_NOTIFICATION_SERVICE_IRSA_ROLE_ARN|${NOTIFICATION_SERVICE_ROLE_ARN}|g" \
            -e "s|REPLACE_WITH_DYNAMODB_TABLE_NAME|${DYNAMODB_TABLE}|g" \
            -e "s|REPLACE_WITH_RDS_SECRET_NAME|${RDS_SECRET_NAME}|g" \
            -e "s|REPLACE_WITH_SQS_QUEUE_URL|${SQS_QUEUE_URL}|g" \
            -e "s|REPLACE_WITH_STRONG_JWT_SECRET|${JWT_SECRET}|g" \
            -e "s|noreply@cloudmart.example|${FROM_EMAIL}|g" \
            {} +

          kubectl kustomize k8s/rendered > rendered-manifests.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -k k8s/rendered

      - name: Wait for rollout
        env:
          DEPLOY_ENV: ${{ steps.env.outputs.deploy_env }}
        run: |
          NAMESPACE="cloudmart-prod"
          if [ "${DEPLOY_ENV}" = "staging" ]; then
            NAMESPACE="cloudmart-staging"
          fi

          kubectl rollout status deployment/frontend -n "${NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/product-service -n "${NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/order-service -n "${NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/user-service -n "${NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/notification-service -n "${NAMESPACE}" --timeout=180s

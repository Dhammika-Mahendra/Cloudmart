name: Services CI

on:
  push:
    branches:
      - main
      - staging
      - dev_deshani
    paths:
      - "services/**"
      - ".github/workflows/services-ci.yml"
  pull_request:
    paths:
      - "services/**"
      - ".github/workflows/services-ci.yml"

permissions:
  contents: read
  security-events: write

jobs:
  python-services:
    name: Python Service Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - product-service
          - user-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Compile Python
        working-directory: services/${{ matrix.service }}
        run: python -m py_compile app.py

      - name: Lint with flake8
        working-directory: services/${{ matrix.service }}
        run: flake8 app.py

      - name: Run Pytest
        working-directory: services/${{ matrix.service }}
        run: pytest

  node-services:
    name: Node Service Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - order-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Run linting
        working-directory: services/${{ matrix.service }}
        run: npm run lint

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: npm test -- --passWithNoTests

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: services/frontend
        run: npm install

      - name: Run linting
        working-directory: services/frontend
        run: npm run lint

      - name: Run tests
        working-directory: services/frontend
        run: npm test

      - name: Build frontend
        working-directory: services/frontend
        run: npm run build

  docker-build-and-scan:
    name: Docker Build and Trivy Scan
    runs-on: ubuntu-latest
    needs:
      - python-services
      - node-services
      - frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: product-service
            context: services/product-service
          - service: order-service
            context: services/order-service
          - service: user-service
            context: services/user-service
          - service: notification-service
            context: services/notification-service
          - service: frontend
            context: services/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t cloudmart/${{ matrix.service }}:${{ github.sha }} ${{ matrix.context }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: cloudmart/${{ matrix.service }}:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  kubernetes-manifests:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.6

      - name: Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Render and validate manifests
        run: |
          kubectl kustomize k8s/base > rendered.yaml
          kubeconform -strict -summary rendered.yaml
